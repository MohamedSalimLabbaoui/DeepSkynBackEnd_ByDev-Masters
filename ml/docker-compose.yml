version: '3.8'

services:
  sign-language-translation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lsf-microservice
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app.py:/app/app.py  # Hot reload du code
      - ./models:/app/models  # Dossier des modèles
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# À étendre selon vos besoins
# - Ajouter une DB PostgreSQL pour les logs
# - Ajouter Redis pour le cache
# - Ajouter Prometheus pour le monitoring
